<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inserção Regional — PPGSND/UFOPA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
:root{--ink:#1a2332;--ink2:#3a4a5c;--fog:#8a9baa;--line:#dde4ea;--paper:#f7f5f1;--card:#ffffff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--ink);overflow:hidden;display:flex;flex-direction:column}
header{background:var(--ink);color:#f0ece4;height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid #2a9d8f}
.hdr-left{display:flex;align-items:baseline;gap:14px}
header h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;letter-spacing:.02em;color:#f0ece4}
.hdr-div{width:1px;height:14px;background:#3a4a5c}
.hdr-sub{font-size:10px;color:#8a9baa;letter-spacing:.08em;text-transform:uppercase}
.hdr-prog{font-size:10px;color:#6a7a8a;letter-spacing:.02em}
.layout{display:grid;grid-template-columns:300px 1fr;flex:1;min-height:0}
aside{background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.side-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.side-head h2{font-family:'Playfair Display',serif;font-size:14px;font-weight:400;color:var(--ink2);margin-bottom:11px}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fb{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:transparent;cursor:pointer;color:var(--fog);font-family:'DM Sans',sans-serif;transition:all .15s}
.fb:hover{border-color:var(--ink2);color:var(--ink2)}
.fb.on{background:var(--ink);color:#f0ece4;border-color:var(--ink)}
.proj-list{overflow-y:auto;flex:1;padding:8px 10px}
.proj-list::-webkit-scrollbar{width:3px}
.proj-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.pitem{padding:9px 10px 9px 14px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;display:flex;gap:9px;align-items:flex-start;transition:all .15s;position:relative}
.pitem::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 2px 2px 0;background:transparent;transition:background .15s}
.pitem:hover{background:var(--paper)}
.pitem.on{background:var(--paper);border-color:var(--line)}
.pitem.on::before{background:var(--cor,#2a9d8f)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ptitle{font-size:12px;font-weight:500;line-height:1.4;color:var(--ink);margin-bottom:2px}
.pmeta{font-size:10px;color:var(--fog);font-weight:300}
.ptag{display:inline-block;font-size:9px;padding:1px 7px;border-radius:20px;margin-top:4px;font-weight:500}
.info-panel{padding:14px 18px;border-top:1px solid var(--line);background:var(--paper);flex-shrink:0;min-height:105px;font-size:11px;line-height:1.7;color:var(--fog)}
.info-panel strong{font-family:'Playfair Display',serif;font-size:12.5px;font-weight:600;color:var(--ink);display:block;margin-bottom:3px}
.info-meta{font-size:10px;color:var(--fog);display:block;margin-bottom:6px}
.info-panel em{font-style:italic}
.mapboxgl-ctrl-logo{display:none!important}
.mapboxgl-ctrl-attrib{font-size:9px!important}
.mapboxgl-ctrl-group{border-radius:8px!important;box-shadow:0 2px 8px rgba(0,0,0,.12)!important;border:none!important}
.sede-marker{width:14px;height:14px;background:#e63946;border:2.5px solid white;border-radius:50%;box-shadow:0 0 0 4px rgba(230,57,70,.2),0 2px 6px rgba(0,0,0,.3);animation:pulse 2.5s ease-in-out infinite;cursor:pointer}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(230,57,70,.2),0 2px 6px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 10px rgba(230,57,70,.04),0 2px 6px rgba(0,0,0,.3)}}
.mapboxgl-popup-content{font-family:'DM Sans',sans-serif!important;font-size:11px!important;padding:8px 12px!important;border-radius:8px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important;border-left:3px solid #e63946}
.mapboxgl-popup-tip{display:none!important}
.legend{position:absolute;bottom:28px;right:10px;background:rgba(255,255,255,.93);border-radius:10px;padding:10px 14px;font-size:10px;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.legend h4{font-family:'Playfair Display',serif;font-size:10px;font-weight:400;color:var(--fog);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;color:var(--ink2)}
.leg-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<header>
  <div class="hdr-left">
    <h1>Inserção Regional</h1>
    <div class="hdr-div"></div>
    <span class="hdr-sub">PPGSND · UFOPA</span>
  </div>
  <span class="hdr-prog">Programa de Pós-Graduação em Sociedade, Natureza e Desenvolvimento · Santarém · Pará</span>
</header>
<div class="layout">
  <aside>
    <div class="side-head">
      <h2>Teses &amp; Dissertações</h2>
      <div class="filters">
        <button class="fb on" onclick="setFat(this,'todos')">Todos</button>
        <button class="fb" onclick="setFat(this,'local')">Local</button>
        <button class="fb" onclick="setFat(this,'amazonia')">Amazônia</button>
        <button class="fb" onclick="setFat(this,'nacional')">Nacional</button>
        <button class="fb" onclick="setFat(this,'internacional')">Internacional</button>
      </div>
    </div>
    <div class="proj-list" id="proj-list"></div>
    <div class="info-panel" id="info-panel">
      <em>Selecione um projeto para ver a área de abrangência no mapa.</em>
    </div>
  </aside>
  <div style="position:relative;flex:1;min-height:0">
    <div id="map" style="position:absolute;inset:0"></div>
    <div class="legend">
      <h4>Escopo geográfico</h4>
      <div class="leg-row"><div class="leg-d" style="background:#7b61c9"></div>Local / Municipal</div>
      <div class="leg-row"><div class="leg-d" style="background:#2a9d8f"></div>Amazônia</div>
      <div class="leg-row"><div class="leg-d" style="background:#e76f51"></div>Nacional</div>
      <div class="leg-row"><div class="leg-d" style="background:#457b9d"></div>Internacional</div>
    </div>
  </div>
</div>
<script>
mapboxgl.accessToken='pk.eyJ1IjoibWluZXJ2aW5vIiwiYSI6ImNtcDY5d2NybjFqdGkyd3BvNXFwaWpocXMifQ.hGOWNoeu_tlj8KNC8zmTpQ';
var PROJ=[],fat="todos",ativo=null,map;
var VIEW_SA={center:[-55,-5],zoom:5.5};
var VIEW_WORLD={center:[0,10],zoom:1.8};

function toGeoJSON(p){
  if(p.tipo_area==='multipolygon'){
    return{type:'FeatureCollection',features:p.areas.map(function(a){
      return{type:'Feature',properties:{cor:p.cor},
        geometry:{type:'Polygon',coordinates:[a.coords.map(function(c){return[c[0],c[1]];})]}};
    })};
  }
  return{type:'FeatureCollection',features:[{type:'Feature',properties:{cor:p.cor},
    geometry:{type:'Polygon',coordinates:[p.coords.map(function(c){return[c[0],c[1]];})]}
  }]};
}

function getBounds(p){
  var pts=p.tipo_area==='multipolygon'
    ?p.areas.reduce(function(acc,a){return acc.concat(a.coords);},[])
    :p.coords;
  var lons=pts.map(function(c){return c[0];});
  var lats=pts.map(function(c){return c[1];});
  return[[Math.min.apply(null,lons),Math.min.apply(null,lats)],
         [Math.max.apply(null,lons),Math.max.apply(null,lats)]];
}

function initMap(){
  map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/light-v11',
    center:VIEW_SA.center,zoom:VIEW_SA.zoom,projection:'mercator'});
  map.addControl(new mapboxgl.NavigationControl({showCompass:false}),'top-right');
  var el=document.createElement('div');
  el.className='sede-marker';
  new mapboxgl.Marker({element:el,anchor:'center'})
    .setLngLat([-54.72,-2.44])
    .setPopup(new mapboxgl.Popup({offset:14,closeButton:false})
      .setHTML('<strong>Santarém / UFOPA</strong><br><span style="color:#8a9baa;font-size:10px">Sede do PPGSND</span>'))
    .addTo(map);
  map.on('load',function(){
    map.addSource('area',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({id:'area-fill',type:'fill',source:'area',
      paint:{'fill-color':['get','cor'],'fill-opacity':0.22}});
    map.addLayer({id:'area-line',type:'line',source:'area',
      paint:{'line-color':['get','cor'],'line-width':2,'line-opacity':0.9}});
    render();
  });
}

function ativar(p){
  if(!map||!map.getSource('area'))return;
  var view=p.cat==='internacional'?VIEW_WORLD:VIEW_SA;
  map.jumpTo({center:view.center,zoom:view.zoom});
  map.getSource('area').setData(toGeoJSON(p));
  ativo=p.id;render();
  document.getElementById('info-panel').innerHTML=
    '<strong>'+p.titulo+'</strong>'+
    '<span class="info-meta">'+p.autor+' &nbsp;·&nbsp; '+p.tipo+' &nbsp;·&nbsp; '+p.ano+'</span>'+
    p.desc;
}

function setFat(btn,cat){
  fat=cat;ativo=null;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(map&&map.getSource('area'))
    map.getSource('area').setData({type:'FeatureCollection',features:[]});
  if(map)map.flyTo({center:VIEW_SA.center,zoom:VIEW_SA.zoom,duration:900,essential:true});
  document.getElementById('info-panel').innerHTML=
    '<em>Selecione um projeto para ver a área de abrangência no mapa.</em>';
  render();
}

function render(){
  var el=document.getElementById('proj-list');
  el.innerHTML='';
  PROJ.filter(function(p){return fat==='todos'||p.cat===fat;}).forEach(function(p){
    var d=document.createElement('div');
    d.className='pitem'+(ativo===p.id?' on':'');
    d.style.setProperty('--cor',p.cor);
    d.innerHTML='<div class="pdot" style="background:'+p.cor+'"></div>'+
      '<div><div class="ptitle">'+p.titulo+'</div>'+
      '<div class="pmeta">'+p.autor+' · '+p.ano+'</div>'+
      '<span class="ptag" style="background:'+p.cor+'18;color:'+p.cor+'">'+p.tipo+'</span></div>';
    d.onclick=(function(pp){return function(){ativar(pp);};})(p);
    el.appendChild(d);
  });
}

fetch('projetos.json')
  .then(function(r){return r.json();})
  .then(function(data){PROJ=data;initMap();})
  .catch(function(err){
    document.getElementById('info-panel').innerHTML=
      '<em style="color:#e63946">Erro: '+err.message+'</em>';
  });
</script>
</body>
</html>
