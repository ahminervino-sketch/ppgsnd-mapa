<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inserção Regional — PPGSND/UFOPA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --ink:    #1a2332;
  --ink2:   #3a4a5c;
  --fog:    #8a9baa;
  --line:   #dde4ea;
  --paper:  #f7f5f1;
  --card:   #ffffff;
  --ocean:  #c2d8e8;
  --land:   #deecd8;
  --brazil: #c5e0b8;
  --c-amaz: #2a9d8f;
  --c-loc:  #7b61c9;
  --c-nac:  #e76f51;
  --c-int:  #457b9d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: #f0ece4;
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 2px solid #2a9d8f;
}
.hdr-title {
  display: flex;
  align-items: baseline;
  gap: 14px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: .02em;
  color: #f0ece4;
}
.hdr-sep { width: 1px; height: 14px; background: #3a4a5c; }
.hdr-sub {
  font-size: 10px;
  color: #8a9baa;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 300;
}
.hdr-badge {
  font-size: 10px;
  color: #8a9baa;
  border: 1px solid #3a4a5c;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: .04em;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR ── */
aside {
  background: var(--card);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.side-head {
  padding: 18px 18px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.side-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink2);
  margin-bottom: 12px;
  letter-spacing: .01em;
}
.filters {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.fb {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: transparent;
  cursor: pointer;
  color: var(--fog);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  transition: all .18s;
  letter-spacing: .02em;
}
.fb:hover { border-color: var(--ink2); color: var(--ink2); }
.fb.on { background: var(--ink); color: #f0ece4; border-color: var(--ink); }

/* ── PROJECT LIST ── */
.proj-list { overflow-y: auto; flex: 1; padding: 8px 10px; }
.proj-list::-webkit-scrollbar { width: 4px; }
.proj-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.pitem {
  padding: 10px 10px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 2px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  transition: all .18s;
  position: relative;
}
.pitem::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  background: transparent;
  transition: background .18s;
}
.pitem:hover { background: var(--paper); }
.pitem.on { background: var(--paper); border-color: var(--line); }
.pitem.on::before { background: var(--accent, #2a9d8f); }

.pdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.pbody {}
.ptitle {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.45;
  color: var(--ink);
  margin-bottom: 2px;
}
.pmeta {
  font-size: 10px;
  color: var(--fog);
  font-weight: 300;
}
.ptag {
  display: inline-block;
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 20px;
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: .02em;
}

/* ── INFO PANEL ── */
.info-panel {
  padding: 14px 18px;
  border-top: 1px solid var(--line);
  background: var(--paper);
  flex-shrink: 0;
  min-height: 100px;
  font-size: 11px;
  line-height: 1.7;
  color: var(--fog);
}
.info-panel.filled { color: var(--ink2); }
.info-panel strong {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  display: block;
  margin-bottom: 3px;
}
.info-panel .imeta {
  font-size: 10px;
  color: var(--fog);
  margin-bottom: 6px;
  display: block;
}
.info-panel em { font-style: italic; }

/* ── MAP ── */
main {
  position: relative;
  background: var(--ocean);
  overflow: hidden;
}
#map-svg {
  width: 100%; height: 100%;
  display: block;
  cursor: grab;
}
#map-svg:active { cursor: grabbing; }

.land-path { fill: var(--land); stroke: #b8ccc0; stroke-width: .5; }
.land-path.brazil { fill: var(--brazil); stroke: #8ab890; stroke-width: .8; }

.ov-path {
  opacity: 0;
  transition: opacity .45s ease;
  pointer-events: none;
}
.ov-path.vis { opacity: 1; }

/* ── SEDE MARKER ── */
.sede-ring {
  fill: none;
  stroke: #e63946;
  stroke-width: 1.5;
  opacity: .6;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { r: 10; opacity: .5; }
  50% { r: 14; opacity: .15; }
}

/* ── LEGEND ── */
.legend {
  position: absolute;
  bottom: 16px; right: 16px;
  background: rgba(255,255,255,.92);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 10px;
  backdrop-filter: blur(4px);
}
.legend-title {
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  color: var(--fog);
  margin-bottom: 8px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: var(--ink2); }
.leg-d { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── ZOOM HINT ── */
.zoom-hint {
  position: absolute;
  bottom: 16px; left: 16px;
  font-size: 10px;
  color: rgba(26,35,50,.5);
  font-weight: 300;
  letter-spacing: .04em;
}

/* ── LOADING ── */
#loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--ocean);
  z-index: 20;
}
.load-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink);
  display: inline-block;
  animation: blink 1.2s ease-in-out infinite;
  margin: 0 3px;
}
.load-dot:nth-child(2) { animation-delay: .2s; }
.load-dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
.load-txt { font-size: 12px; color: var(--ink2); margin-top: 10px; font-weight: 300; }
</style>
</head>
<body>

<header>
  <div class="hdr-title">
    <h1>Inserção Regional</h1>
    <div class="hdr-sep"></div>
    <span class="hdr-sub">PPGSND · UFOPA · Santarém</span>
  </div>
  <span class="hdr-badge">Programa de Pós-Graduação em Sociedade, Natureza e Desenvolvimento</span>
</header>

<div class="layout">
  <aside>
    <div class="side-head">
      <h2>Teses &amp; Dissertações</h2>
      <div class="filters">
        <button class="fb on" onclick="setFat(this,'todos')">Todos</button>
        <button class="fb" onclick="setFat(this,'local')">Local</button>
        <button class="fb" onclick="setFat(this,'amazonia')">Amazônia</button>
        <button class="fb" onclick="setFat(this,'nacional')">Nacional</button>
        <button class="fb" onclick="setFat(this,'internacional')">Internacional</button>
      </div>
    </div>
    <div class="proj-list" id="proj-list"></div>
    <div class="info-panel" id="info-panel">
      <em>Selecione um projeto para ver a área de abrangência.</em>
    </div>
  </aside>

  <main>
    <div id="loading">
      <div>
        <span class="load-dot"></span>
        <span class="load-dot"></span>
        <span class="load-dot"></span>
      </div>
      <div class="load-txt">Carregando mapa...</div>
    </div>
    <svg id="map-svg"></svg>
    <div class="legend">
      <div class="legend-title">Escopo geográfico</div>
      <div class="leg-row"><div class="leg-d" style="background:var(--c-loc)"></div>Local / Municipal</div>
      <div class="leg-row"><div class="leg-d" style="background:var(--c-amaz)"></div>Amazônia</div>
      <div class="leg-row"><div class="leg-d" style="background:var(--c-nac)"></div>Nacional</div>
      <div class="leg-row"><div class="leg-d" style="background:var(--c-int)"></div>Internacional</div>
    </div>
    <div class="zoom-hint">scroll · arrastar</div>
  </main>
</div>

<script>
var PROJ = [], fat = "todos", ativo = null;
var svgSel, g, projSA, projWorld, pathFn, zoomB;
var currentView = "sa"; // "sa" or "world"

function W() { return document.querySelector("main").clientWidth || 700; }
function H() { return document.querySelector("main").clientHeight || 560; }

// Two fixed projections
function makeProjSA(w, h) {
  return d3.geoMercator().center([-55, -15]).scale(w * 1.05).translate([w/2, h/2]);
}
function makeProjWorld(w, h) {
  return d3.geoNaturalEarth1().scale(w / 6.5).translate([w/2, h/2]);
}

var activeProj; // current d3 projection in use

function initMap(world) {
  document.getElementById("loading").style.display = "none";
  var w = W(), h = H();

  svgSel = d3.select("#map-svg").attr("width", w).attr("height", h);

  projSA    = makeProjSA(w, h);
  projWorld = makeProjWorld(w, h);
  activeProj = projSA;
  pathFn = d3.geoPath().projection(activeProj);

  zoomB = d3.zoom().scaleExtent([0.25, 80]).on("zoom", function(e) {
    g.attr("transform", e.transform);
  });
  svgSel.call(zoomB);
  g = svgSel.append("g");

  // Draw countries
  g.selectAll(".land-path")
    .data(world.features)
    .enter().append("path")
    .attr("class", function(d) {
      return d.properties.name === "Brazil" ? "land-path brazil" : "land-path";
    })
    .attr("d", pathFn);

  // Brazil label
  var brC = projSA([-52, -12]);
  g.append("text")
    .attr("id", "br-label")
    .attr("x", brC[0]).attr("y", brC[1])
    .attr("text-anchor", "middle")
    .attr("font-size", "11px").attr("font-weight", "500")
    .attr("fill", "#4a7a4a").attr("font-family", "'DM Sans',sans-serif")
    .attr("pointer-events", "none").attr("letter-spacing", ".04em")
    .text("Brasil");

  // UFOPA marker
  var sede = projSA([-54.72, -2.44]);
  var mg = g.append("g").attr("transform", "translate(" + sede[0] + "," + sede[1] + ")");
  mg.append("circle").attr("class", "sede-ring").attr("r", 10);
  mg.append("circle").attr("r", 5).attr("fill", "#e63946").attr("stroke", "white").attr("stroke-width", 1.8);
  mg.append("circle").attr("r", 2).attr("fill", "white");
  mg.append("text").attr("x", 9).attr("y", -5)
    .attr("font-size", "8.5px").attr("fill", "#e63946")
    .attr("font-family", "'DM Sans',sans-serif").attr("font-weight", "500")
    .attr("pointer-events", "none").text("Santarém / UFOPA");
}

function drawOverlays() {
  if (!g) return;
  g.selectAll(".ov-path").remove();
  PROJ.forEach(function(p) {
    var b = p.bbox;
    var coords = [[b[0],b[1]], [b[2],b[1]], [b[2],b[3]], [b[0],b[3]], [b[0],b[1]]];
    // Draw in both projections — we'll switch which one is visible
    g.append("path")
      .attr("id", "ov-" + p.id)
      .attr("class", "ov-path")
      .attr("d", pathFn({type:"Feature", geometry:{type:"Polygon", coordinates:[coords]}}))
      .attr("fill", p.cor)
      .attr("fill-opacity", 0.35)
      .attr("stroke", p.cor)
      .attr("stroke-width", 2)
      .attr("stroke-linejoin", "round");
  });
}

function switchView(view) {
  if (view === currentView) return;
  currentView = view;
  activeProj = (view === "world") ? projWorld : projSA;
  pathFn = d3.geoPath().projection(activeProj);

  // Redraw all paths with new projection
  g.selectAll(".land-path").attr("d", pathFn);
  g.selectAll(".ov-path").each(function(d) {
    // re-project overlay from stored bbox
  });

  // Redraw overlays
  var visible = [];
  g.selectAll(".ov-path").each(function() {
    if (this.classList.contains("vis")) visible.push(this.id.replace("ov-",""));
  });
  drawOverlays();
  visible.forEach(function(id) {
    var el = document.getElementById("ov-" + id);
    if (el) el.classList.add("vis");
  });

  // Move sede marker
  var sede = activeProj([-54.72, -2.44]);
  g.select("g").attr("transform", "translate(" + sede[0] + "," + sede[1] + ")");

  // Move BR label
  var brC = activeProj([-52, -12]);
  g.select("#br-label").attr("x", brC[0]).attr("y", brC[1]);

  // Reset zoom
  svgSel.transition().duration(700).call(zoomB.transform, d3.zoomIdentity);
}

function ativar(p) {
  // Hide all overlays
  PROJ.forEach(function(pr) {
    var e = document.getElementById("ov-" + pr.id);
    if (e) e.classList.remove("vis");
  });

  // Switch view based on category
  if (p.cat === "internacional") {
    switchView("world");
  } else {
    switchView("sa");
  }

  // Show this overlay
  var ov = document.getElementById("ov-" + p.id);
  if (ov) {
    setTimeout(function() { ov.classList.add("vis"); }, p.cat === "internacional" ? 500 : 0);
  }

  ativo = p.id;
  render();

  // Update info panel
  var ip = document.getElementById("info-panel");
  ip.className = "info-panel filled";
  ip.innerHTML =
    "<strong>" + p.titulo + "</strong>" +
    "<span class='imeta'>" + p.autor + " &nbsp;·&nbsp; " + p.tipo + " &nbsp;·&nbsp; " + p.ano + "</span>" +
    p.desc;
}

function setFat(btn, cat) {
  fat = cat; ativo = null;
  document.querySelectorAll(".fb").forEach(function(b) { b.classList.remove("on"); });
  btn.classList.add("on");
  PROJ.forEach(function(pr) {
    var e = document.getElementById("ov-" + pr.id);
    if (e) e.classList.remove("vis");
  });
  switchView("sa");
  var ip = document.getElementById("info-panel");
  ip.className = "info-panel";
  ip.innerHTML = "<em>Selecione um projeto para ver a área de abrangência.</em>";
  render();
}

function render() {
  var el = document.getElementById("proj-list");
  el.innerHTML = "";
  PROJ.filter(function(p) { return fat === "todos" || p.cat === fat; })
    .forEach(function(p) {
      var d = document.createElement("div");
      d.className = "pitem" + (ativo === p.id ? " on" : "");
      d.style.setProperty("--accent", p.cor);
      d.innerHTML =
        "<div class='pdot' style='background:" + p.cor + "'></div>" +
        "<div class='pbody'>" +
          "<div class='ptitle'>" + p.titulo + "</div>" +
          "<div class='pmeta'>" + p.autor + " · " + p.ano + "</div>" +
          "<span class='ptag' style='background:" + p.cor + "18;color:" + p.cor + "'>" + p.tipo + "</span>" +
        "</div>";
      d.onclick = (function(pp) { return function() { ativar(pp); }; })(p);
      el.appendChild(d);
    });
}

window.addEventListener("DOMContentLoaded", function() {
  fetch("world.json")
    .then(function(r) { return r.json(); })
    .then(function(world) {
      initMap(world);
      return fetch("projetos.json");
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      PROJ = data;
      drawOverlays();
      render();
    })
    .catch(function(err) {
      document.getElementById("loading").innerHTML =
        "<div class='load-txt' style='color:#e63946'>Erro: " + err.message + "</div>";
      console.error(err);
    });
});
</script>
</body>
</html>
